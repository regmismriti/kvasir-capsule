apiVersion: v1
kind: Pod
metadata:
  name: kvasir-capsule-data
  namespace: usd-djha
  labels:
    app: kvasir-capsule-data
    user: smritiregmi
spec:
  restartPolicy: Never
  containers:
    - name: data-loader
      image: python:3.11-slim
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail

          apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
          pip install --no-cache-dir tcia_utils pydicom pandas h5py numpy

          # Clone the repo and install the package once (the conversion +
          # validation steps below need `import ctdenoiser`; running the script
          # alone only puts scripts/ on sys.path, not the repo root). torch comes
          # from the CPU index to avoid a multi-GB CUDA wheel on this CPU-only pod.
          # git clone https://github.com/tsereda/ctdenoiser.git /app/ctdenoiser
          # cd /app/ctdenoiser
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -e ".[h5]"



          ls -lah /data/
      volumeMounts:
        - name: workspace
          mountPath: /app
        - name: data
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
      resources:
        requests:
          memory: 8Gi
          cpu: "2"
        limits:
          memory: 16Gi
          cpu: "4"
  volumes:
    - name: workspace
      emptyDir:
        sizeLimit: 50Gi
    - name: data
      persistentVolumeClaim:
        claimName: kvasir-capsule
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
